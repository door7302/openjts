  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: always
    user: root
    depends_on:
      - prometheus
    ports:
      - '${GRAFANA_PORT}:3000'
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/home.json
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-boomtable-panel, agenty-flowcharting-panel
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/cert:/tmp
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/data:/var/lib/grafana
      - ./grafana/plugins:/var/lib/grafana/plugins
  jtso:
    build: https://github.com/door7302/jtso.git#stack_upgrade
    image: jtso:latest
    container_name: jtso
    restart: always
    user: root
    environment:
      - APP_SECRET=${APP_SECRET}
    volumes:
      - appdata:/data
      - /var/log:/var/log
      - ./jtso/db:/etc/jtso
      - ./jtso/config.yml:/etc/jtso/config.yml
      - ./.version:/etc/jtso/openjts.version
      - ./jtso/cert:/var/cert
      - ./jtso/yang:/var/yang
      - ./jtso/profiles:/var/profiles
      - ./jtso/ondemand:/var/ondemand
      - ./jtso/active_profiles:/var/active_profiles
      - ./telegraf:/var/shared/telegraf
      - ./telegraf/metadata:/var/metadata
      - ./grafana/data:/var/shared/grafana
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - '${JTSO_PORT}:8082'
volumes:
  appdata: