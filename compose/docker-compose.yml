services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: always
    user: root
    ports:
      - '9090:9090'
    volumes:
      - /var/log:/var/log
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROM_RETENTION}'
      - '--storage.tsdb.retention.size=${PROM_RETENTION_SIZE}'
      - '--storage.tsdb.wal-compression'
      - '--query.max-concurrency=20'
      - '--query.max-samples=50000000'
      - '--query.timeout=2m'
      - '--web.enable-admin-api'
      - '--web.enable-lifecycle'
  promlens:
      image: prom/promlens:latest
      container_name: promlens
      restart: always
      command:
        - '--web.listen-address=:8080'
        - '--web.default-prometheus-url=http://prometheus:9090'
      ports:
        - "8081:8080"
      volumes:
        - /var/log:/var/log
        - ./promlens/data:/data
      depends_on:
        - prometheus
  telegraf_mx:
    build: https://github.com/door7302/jts_telegraf.git#v1.0.17
    image: jts_telegraf:latest
    container_name: telegraf_mx
    restart: always
    user: root
    depends_on:
      - prometheus
    ports:
      - '9273:9273'
    volumes:
      - /var/log:/var/log
      - ./telegraf/mx:/etc/telegraf/
      - ./telegraf/metadata:/var/metadata
      - ./telegraf/cert:/var/cert
    command:
      --config-directory /etc/telegraf/telegraf.d
  telegraf_ptx:
    image: jts_telegraf:latest
    container_name: telegraf_ptx
    restart: always
    user: root
    depends_on:
      - telegraf_mx
      - prometheus
    ports:
      - '9274:9273'
    volumes:
      - /var/log:/var/log
      - ./telegraf/ptx:/etc/telegraf/
      - ./telegraf/metadata:/var/metadata
      - ./telegraf/cert:/var/cert
    command:
      --config-directory /etc/telegraf/telegraf.d
  telegraf_acx:
    image: jts_telegraf:latest
