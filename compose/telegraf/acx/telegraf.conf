###############################################################################
#                              GLOBAL CONFIG                                  #
###############################################################################

[agent]

  round_interval = true
  metric_batch_size = 10000
  metric_buffer_limit = 500000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "5s"
  debug = false 
  quiet = false
  logfile = "/var/log/debugtelegraf_acx.log"
  hostname = ""
  omit_hostname = false

[[inputs.internal]]
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf_acx"
  timeout = "10s"
