worker_processes 1;
events {
    worker_connections 1024;
}

http {
    # =========================================================================
    # PromLens reverse proxy — listens on port 8081 and forwards to promlens:8080
    #
    # PromLens has no native TLS, so SSL is handled here. To switch modes,
    # enable exactly ONE of the two server blocks below, then reload:
    #
    #     docker compose restart promlens_proxy
    #
    # Certificates are reused from ./grafana/cert (mounted at /etc/nginx/certs).
    # Expected files: server.crt and server.key
    # =========================================================================

    # ---- HTTPS (default) -----------------------------------------------------
    server {
        listen 8081 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://promlens:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ---- HTTP (no SSL) -------------------------------------------------------
    # To run without SSL: comment out the HTTPS block above and uncomment this.
    #
    # server {
    #     listen 8081;
    #     server_name _;
    #
    #     location / {
    #         proxy_pass         http://promlens:8080;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #     }
    # }
}
